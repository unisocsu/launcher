name: Android Build KitKat Compatibility

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle

    - name: Ensure gradlew exists and is executable
      run: |
        # בדיקה אם gradlew קיים בתיקיית השורש או בתוך app
        if [ ! -f "./gradlew" ] && [ ! -f "./app/gradlew" ]; then
          echo "gradlew not found, generating wrapper..."
          gradle wrapper
        fi
        
        # מתן הרשאות למי שנמצא
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        elif [ -f "./app/gradlew" ]; then
          chmod +x ./app/gradlew
        fi

    - name: Build with Gradle
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug
        else
          # כניסה לתיקיית ה-app והרצת הבנייה משם
          cd app && ./gradlew assembleDebug
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: launcher-debug-apk
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
