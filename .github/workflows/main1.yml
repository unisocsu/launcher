name: Android Build KitKat Compatibility

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # מאפשר לך להפעיל את הבנייה ידנית מהאתר של גיטהאב בכל רגע!

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # הגדרת גרסת ה-Java הנכונה לפרויקט ישן (תואם אנדרואיד 4.4 / KitKat)
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # הרצת הבנייה והפקת ה-APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # שמירת ה-APK שנוצר כדי שתוכל להוריד אותו ולהתקין עם ADB
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: launcher-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
